<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biometrics - Biometric Studio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Neon Colors */
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-yellow: #ffff00;
            --neon-green: #00ff00;
            --neon-orange: #ff6600;
            --neon-pink: #ff1493;
            --neon-blue: #0080ff;
            --neon-purple: #9d00ff;
            
            /* Pearl White Tones */
            --pearl-white: #f8f8ff;
            --pearl-light: #ffffff;
            --pearl-dark: #e8e8f0;
            --pearl-shadow: #d8d8e8;
            
            /* Dark Background for Glow */
            --bg-dark: #0a0a0f;
            --bg-darker: #050508;
            --bg-panel: #12121a;
            --bg-elevated: #1a1a25;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-dark);
            color: var(--pearl-white);
            overflow: hidden;
            height: 100vh;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-darker) 100%);
        }

        /* Top Menu Bar */
        .menu-bar {
            height: 35px;
            background: var(--pearl-white);
            border-bottom: 2px solid var(--neon-cyan);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            position: relative;
            z-index: 100;
        }

        .menu-item {
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            font-size: 11px;
            color: var(--bg-dark);
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 4px;
            transition: all 0.3s ease;
            position: relative;
        }

        .menu-item:hover {
            background: var(--neon-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 14px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            margin-right: auto;
        }

        /* Main Content Area */
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Center Area - Piano Roll & Tracks */
        .center-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-panel);
        }

        /* Toolbar */
        .toolbar {
            height: 50px;
            background: var(--pearl-white);
            border-bottom: 2px solid var(--neon-green);
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 6px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            overflow-x: auto;
            overflow-y: hidden;
        }

        .toolbar::-webkit-scrollbar {
            height: 6px;
        }

        .toolbar::-webkit-scrollbar-track {
            background: var(--pearl-dark);
            border-radius: 3px;
        }

        .toolbar::-webkit-scrollbar-thumb {
            background: linear-gradient(90deg, var(--neon-green), var(--neon-cyan));
            border-radius: 3px;
            box-shadow: 0 0 10px var(--neon-green);
        }

        .instrument-tabs {
            display: flex;
            gap: 4px;
            margin-right: 10px;
            padding-right: 10px;
            border-right: 2px solid var(--pearl-shadow);
            overflow-x: auto;
            max-width: 450px;
            scrollbar-width: thin;
            flex-shrink: 0;
        }

        .instrument-tabs::-webkit-scrollbar {
            height: 6px;
        }

        .instrument-tabs::-webkit-scrollbar-track {
            background: var(--pearl-dark);
            border-radius: 3px;
        }

        .instrument-tabs::-webkit-scrollbar-thumb {
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta));
            border-radius: 3px;
            box-shadow: 0 0 5px var(--neon-cyan);
        }

        .instrument-tab {
            background: linear-gradient(135deg, var(--pearl-light), var(--pearl-dark));
            border: 2px solid var(--pearl-shadow);
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            color: var(--bg-dark);
            transition: all 0.3s ease;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .instrument-tab:hover {
            border-color: var(--neon-magenta);
            box-shadow: 0 0 15px var(--neon-magenta);
            transform: scale(1.05);
        }

        .instrument-tab.active {
            background: var(--neon-magenta);
            border-color: var(--neon-magenta);
            box-shadow: 0 0 20px var(--neon-magenta);
            color: var(--pearl-white);
        }

        .tool-btn {
            background: linear-gradient(135deg, var(--pearl-light), var(--pearl-dark));
            border: 2px solid var(--pearl-shadow);
            padding: 5px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            color: var(--bg-dark);
            transition: all 0.3s ease;
            font-size: 10px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .tool-btn:hover {
            border-color: var(--neon-green);
            box-shadow: 0 0 15px var(--neon-green);
            transform: scale(1.05);
        }

        .tool-btn.active {
            background: var(--neon-green);
            border-color: var(--neon-green);
            box-shadow: 0 0 20px var(--neon-green);
            color: var(--bg-dark);
        }

        .play-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: var(--pearl-white);
            box-shadow: 0 0 20px var(--neon-cyan);
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px var(--neon-cyan);
        }

        .bpm-display {
            background: var(--bg-dark);
            padding: 5px 10px;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 11px;
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
            cursor: pointer;
            flex-shrink: 0;
        }

        /* Piano Roll - 60 Second Scrollable Timeline */
        .piano-roll {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: var(--bg-panel);
            border-bottom: 2px solid var(--neon-purple);
        }

        .piano-roll-grid {
            display: grid;
            grid-template-columns: 80px 1fr;
            background: var(--bg-darker);
            height: 100%;
            overflow: hidden;
        }

        .piano-keys {
            background: var(--pearl-white);
            border-right: 2px solid var(--neon-purple);
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.3);
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
            z-index: 10;
        }

        .piano-keys.piano-1 {
            border-right: 2px solid var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .piano-keys.piano-2 {
            border-right: 2px solid var(--neon-magenta);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }

        .piano-keys.piano-3 {
            border-right: 2px solid var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        .piano-keys.piano-4 {
            border-right: 2px solid var(--neon-yellow);
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.5);
        }

        .piano-key {
            height: 25px;
            border-bottom: 1px solid var(--pearl-shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
            font-size: 11px;
            font-weight: 600;
            color: var(--bg-dark);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .piano-key:hover {
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .piano-key.black {
            background: var(--bg-dark);
            color: var(--neon-cyan);
        }

        .note-grid {
            position: relative;
            height: 100%;
            overflow-x: auto;
            overflow-y: auto;
            background: var(--bg-darker);
        }
        
        .note-grid::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        
        .note-grid::-webkit-scrollbar-track {
            background: var(--bg-dark);
            border-radius: 5px;
        }
        
        .note-grid::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
            border-radius: 5px;
            box-shadow: 0 0 10px var(--neon-cyan);
        }
        
        .note-grid::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, var(--neon-magenta), var(--neon-yellow));
            box-shadow: 0 0 15px var(--neon-magenta);
        }
        
        .note-grid-content {
            position: relative;
            /* 60 seconds * 100 pixels per second = 6000px total width */
            width: 6000px;
            min-height: 800px;
            background-image: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 24px,
                    var(--neon-purple) 24px,
                    var(--neon-purple) 25px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 99px,
                    rgba(0, 255, 255, 0.2) 99px,
                    rgba(0, 255, 255, 0.2) 100px
                );
            background-size: 100% 25px, 100px 100%;
        }

        /* Timeline ruler */
        .timeline-ruler {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid var(--neon-cyan);
            z-index: 100;
            display: flex;
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            color: var(--neon-cyan);
            font-weight: 600;
        }

        .timeline-marker {
            width: 100px;
            text-align: center;
            border-right: 1px solid rgba(0, 255, 255, 0.3);
            padding-top: 8px;
            flex-shrink: 0;
        }

        /* Waveform canvas */
        .waveform-canvas {
            position: absolute;
            top: 30px;
            left: 0;
            width: 100%;
            height: calc(100% - 30px);
            z-index: 2;
            opacity: 0.4;
            pointer-events: none;
        }

        /* Spectrum canvas */
        .spectrum-canvas {
            position: absolute;
            top: 30px;
            left: 0;
            width: 100%;
            height: calc(100% - 30px);
            z-index: 3;
            opacity: 0.6;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        /* Playhead */
        .playhead {
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, var(--neon-red), var(--neon-orange));
            box-shadow: 0 0 15px var(--neon-red);
            z-index: 50;
            pointer-events: none;
        }

        .playhead::before {
            content: '▼';
            position: absolute;
            top: 28px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--neon-red);
            font-size: 14px;
            text-shadow: 0 0 10px var(--neon-red);
        }

        .note {
            position: absolute;
            height: 23px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
            border: 2px solid var(--neon-cyan);
            border-radius: 4px;
            cursor: move;
            box-shadow: 0 0 15px var(--neon-cyan);
            transition: all 0.2s ease;
        }

        .note:hover {
            box-shadow: 0 0 25px var(--neon-cyan);
            transform: scale(1.05);
            z-index: 10;
        }

        /* Step Sequencer Styles */
        .sequencer-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            background: linear-gradient(135deg, var(--bg-panel), var(--bg-darker));
            border: 3px solid var(--neon-cyan);
            border-radius: 15px;
            padding: 30px;
            z-index: 1000;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.5);
            display: none;
        }

        .sequencer-panel.active {
            display: block;
        }

        .sequencer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--neon-cyan);
        }

        .sequencer-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .sequencer-close {
            background: var(--neon-red);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 0 10px var(--neon-red);
        }

        .sequencer-close:hover {
            box-shadow: 0 0 20px var(--neon-red);
            transform: scale(1.1);
        }

        .sequencer-voice {
            margin-bottom: 25px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 2px solid var(--pearl-shadow);
        }

        .voice-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .voice-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: var(--neon-cyan);
        }

        .voice-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .voice-control {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .voice-control label {
            font-size: 11px;
            color: var(--pearl-white);
            font-family: 'Rajdhani', sans-serif;
        }

        .voice-control input[type="range"] {
            width: 80px;
            height: 4px;
        }

        .voice-control input[type="range"]::-webkit-slider-thumb {
            width: 12px;
            height: 12px;
            background: var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 5px var(--neon-cyan);
        }

        .beat-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .beat-checkbox {
            position: relative;
            width: 50px;
            height: 50px;
        }

        .beat-checkbox input[type="checkbox"] {
            appearance: none;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            border: 2px solid var(--pearl-shadow);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .beat-checkbox input[type="checkbox"]:checked {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .beat-checkbox input[type="checkbox"].active {
            border-color: var(--neon-yellow);
            box-shadow: 0 0 20px var(--neon-yellow);
        }

        .beat-checkbox label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            font-weight: bold;
            color: var(--neon-cyan);
            pointer-events: none;
        }

        .sequencer-master-controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            margin-top: 20px;
        }

        .master-control {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .master-control label {
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            color: var(--neon-yellow);
            text-transform: uppercase;
        }

        .master-control input {
            width: 100px;
        }

        .sequencer-play-btn {
            padding: 15px 40px;
            font-size: 18px;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, var(--neon-green), var(--neon-cyan));
            border: 2px solid var(--neon-cyan);
            border-radius: 10px;
            color: white;
            cursor: pointer;
            box-shadow: 0 0 15px var(--neon-cyan);
            transition: all 0.2s;
        }

        .sequencer-play-btn:hover {
            box-shadow: 0 0 25px var(--neon-cyan);
            transform: scale(1.05);
        }

        .sequencer-play-btn.playing {
            background: linear-gradient(135deg, var(--neon-orange), var(--neon-red));
            border-color: var(--neon-orange);
        }

        /* 11 Channel Mixer Strip + Master (Channel 12) */
        .mixer-strip {
            height: 300px;
            background: var(--pearl-white);
            border-top: 3px solid var(--neon-yellow);
            box-shadow: 0 0 30px rgba(255, 255, 0, 0.3);
            display: flex;
            overflow-x: scroll;
            overflow-y: hidden;
            padding: 10px;
            gap: 8px;
            position: relative;
        }

        .mixer-strip::-webkit-scrollbar {
            height: 10px;
        }

        .mixer-strip::-webkit-scrollbar-track {
            background: var(--bg-dark);
            border-radius: 5px;
            margin: 0 10px;
        }

        .mixer-strip::-webkit-scrollbar-thumb {
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta), var(--neon-yellow));
            border-radius: 5px;
            box-shadow: 0 0 15px var(--neon-cyan);
            border: 2px solid var(--pearl-white);
        }

        .mixer-strip::-webkit-scrollbar-thumb:hover {
            box-shadow: 0 0 25px var(--neon-cyan), 0 0 25px var(--neon-magenta);
            transform: scaleY(1.2);
        }

        .channel {
            min-width: 115px;
            width: 115px;
            background: linear-gradient(135deg, var(--pearl-light), var(--pearl-dark));
            border: 2px solid var(--pearl-shadow);
            border-radius: 8px;
            display: flex;
            flex-direction: row;
            align-items: stretch;
            padding: 8px 3px;
            gap: 3px;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .channel:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px var(--neon-cyan);
            transform: translateY(-3px);
        }

        .channel.master {
            min-width: 130px;
            width: 130px;
            background: linear-gradient(135deg, #ffffff, var(--pearl-light));
            border: 3px solid var(--neon-yellow);
            box-shadow: 0 0 25px rgba(255, 255, 0, 0.5);
        }

        .channel.master:hover {
            border-color: var(--neon-yellow);
            box-shadow: 0 0 35px var(--neon-yellow);
        }

        .channel.master .channel-number {
            background: linear-gradient(135deg, var(--neon-yellow), var(--neon-orange));
            font-size: 14px;
            padding: 5px 12px;
            color: #000000;
            text-shadow: 0 0 8px var(--neon-yellow);
        }

        .channel.master .channel-label {
            font-weight: 700;
            font-size: 10px;
            color: #000000;
            text-shadow: 0 0 10px var(--neon-yellow), 0 0 20px var(--neon-yellow);
        }

        /* LED Meter Styling */
        .led-meter {
            width: 8px;
            display: flex;
            flex-direction: column-reverse;
            gap: 2px;
            padding: 5px 0;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }

        .led-segment {
            width: 100%;
            height: 8px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.1s ease;
        }

        .led-segment.active {
            box-shadow: 0 0 8px currentColor, 0 0 12px currentColor;
        }

        /* Decibel Chart Colors */
        .led-segment[data-level="0"] { background: #00bcd4; color: #00bcd4; }
        .led-segment[data-level="10"] { background: #00d4c4; color: #00d4c4; }
        .led-segment[data-level="20"] { background: #00e6b4; color: #00e6b4; }
        .led-segment[data-level="30"] { background: #00ff99; color: #00ff99; }
        .led-segment[data-level="40"] { background: #66ff66; color: #66ff66; }
        .led-segment[data-level="50"] { background: #99ff33; color: #99ff33; }
        .led-segment[data-level="60"] { background: #ccff00; color: #ccff00; }
        .led-segment[data-level="70"] { background: #ffff00; color: #ffff00; }
        .led-segment[data-level="80"] { background: #ffcc00; color: #ffcc00; }
        .led-segment[data-level="90"] { background: #ff9900; color: #ff9900; }
        .led-segment[data-level="100"] { background: #ff6600; color: #ff6600; }
        .led-segment[data-level="110"] { background: #ff3300; color: #ff3300; }
        .led-segment[data-level="120"] { background: #ff0000; color: #ff0000; }
        .led-segment[data-level="130"] { background: #d6006a; color: #d6006a; }
        .led-segment[data-level="140"] { background: #b3005c; color: #b3005c; }

        .channel-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            gap: 5px;
        }

        .channel.master .channel-number {
            background: linear-gradient(135deg, var(--neon-yellow), var(--neon-orange));
            font-size: 14px;
            padding: 5px 12px;
            color: #000000;
            text-shadow: 0 0 8px var(--neon-yellow);
        }

        .channel-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            width: 100%;
        }

        .channel-label {
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            font-size: 9px;
            color: var(--bg-dark);
            text-align: center;
        }

        .channel-number {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 11px;
            color: var(--pearl-white);
            background: var(--neon-cyan);
            padding: 4px 10px;
            border-radius: 4px;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .fx-dropdown {
            width: 100%;
            padding: 4px;
            border: 2px solid var(--pearl-shadow);
            border-radius: 4px;
            background: var(--pearl-light);
            color: var(--bg-dark);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 9px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .fx-dropdown:hover {
            border-color: var(--neon-magenta);
            box-shadow: 0 0 10px var(--neon-magenta);
        }

        .fx-dropdown:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .pan-control {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            width: 100%;
        }

        .pan-label {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 8px;
            color: var(--bg-dark);
        }

        .pan-knob-container {
            position: relative;
            width: 50px;
            height: 50px;
        }

        .pan-knob {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .pan-knob-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                from 135deg,
                #00ffff 0deg,
                #00ff00 45deg,
                #ffff00 90deg,
                #ff6600 135deg,
                #ff0000 180deg,
                #ff00ff 225deg,
                #0080ff 270deg,
                #00ffff 315deg
            );
            opacity: 0.3;
            transition: opacity 0.2s ease;
        }

        .pan-knob:hover .pan-knob-ring {
            opacity: 0.6;
        }

        .pan-knob-ring.active {
            opacity: 1;
            filter: drop-shadow(0 0 10px currentColor);
        }

        .pan-knob-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: 
                radial-gradient(circle at 30% 30%, #ffffff, #e8e8f0 30%, #c0c0d0 60%, #a0a0b0);
            border: 2px solid #606070;
            box-shadow: 
                inset 0 1px 3px rgba(255, 255, 255, 0.8),
                inset 0 -1px 3px rgba(0, 0, 0, 0.5),
                0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .pan-knob-indicator {
            position: absolute;
            width: 3px;
            height: 14px;
            background: var(--neon-cyan);
            top: 3px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 2px;
            box-shadow: 0 0 8px var(--neon-cyan);
            transition: transform 0.1s ease;
        }

        .pan-value {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 8px;
            color: var(--neon-cyan);
        }

        .channel-fader-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 5px;
        }

        .vertical-fader {
            width: 22px;
            height: 60px;
            background: var(--pearl-dark);
            border-radius: 10px;
            position: relative;
            cursor: pointer;
            border: 2px solid var(--pearl-shadow);
        }

        .vertical-fader-fill {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: linear-gradient(180deg, var(--neon-cyan), var(--neon-magenta));
            border-radius: 10px;
            box-shadow: 0 0 10px var(--neon-cyan);
            transition: height 0.1s ease;
        }

        #mediaFileInput {
            display: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Menu Bar -->
        <div class="menu-bar">
            <div class="logo">VITALSJS</div>
            <div class="menu-item" id="loadMediaBtn">LOAD MEDIA</div>
            <input type="file" id="mediaFileInput" accept="audio/*,video/*">
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Center Area -->
            <div class="center-area">
                <!-- Toolbar -->
                <div class="toolbar">
                    <div class="instrument-tabs" id="instrumentTabs"></div>
                    <button class="play-btn" id="playBtn">▶</button>
                    <div class="bpm-display" id="bpmDisplay">BPM: 120</div>
                </div>

                <!-- Piano Roll -->
                <div class="piano-roll">
                    <div class="piano-roll-grid">
                        <div class="piano-keys piano-1" id="pianoKeys"></div>
                        <div class="note-grid">
                            <div class="timeline-ruler" id="timelineRuler"></div>
                            <canvas class="waveform-canvas" id="waveformCanvas"></canvas>
                            <canvas class="spectrum-canvas" id="spectrumCanvas"></canvas>
                            <div class="note-grid-content" id="noteGridContent"></div>
                            <div class="playhead"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mixer Strip -->
        <div class="mixer-strip" id="mixerStrip"></div>
    </div>

    <script>
        // Audio Context and Nodes
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        let mediaSource = null;
        let mediaBuffer = null;
        let audioElement = null;
        let mediaElementAudioSource = null;
        let isPlaying = false;

        // Master gain node
        const masterGain = audioContext.createGain();
        masterGain.connect(audioContext.destination);

        // Array to store channel gains
        const channelGains = [];

        // Initialize mixer channels
        function initializeMixer() {
            const mixerStrip = document.getElementById('mixerStrip');
            mixerStrip.innerHTML = '';
            channelGains.length = 0;

            for (let i = 1; i <= 12; i++) {
                const gain = audioContext.createGain();
                gain.connect(masterGain);
                channelGains.push(gain);

                const channel = document.createElement('div');
                channel.className = i === 12 ? 'channel master' : 'channel';

                let html = `
                    <div class="channel-content">
                        <div class="channel-header">
                            <div class="channel-label">${i === 12 ? 'MASTER' : 'CH'}</div>
                            <div class="channel-number">${i}</div>
                        </div>
                `;

                if (i !== 12) {
                    html += `
                        <select class="fx-dropdown">
                            <option>None</option>
                            <option>Reverb</option>
                            <option>Delay</option>
                            <option>Distortion</option>
                        </select>
                        <div class="pan-control">
                            <div class="pan-label">PAN</div>
                            <div class="pan-knob-container">
                                <div class="pan-knob">
                                    <div class="pan-knob-ring"></div>
                                    <div class="pan-knob-center">
                                        <div class="pan-knob-indicator"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="pan-value">C</div>
                        </div>
                    `;
                }

                html += `
                    <div class="channel-fader-container">
                        <div class="led-meter">
                `;

                for (let j = 0; j < 15; j++) {
                    html += `<div class="led-segment" data-level="${j * 10}"></div>`;
                }

                html += `
                        </div>
                        <div class="vertical-fader">
                            <div class="vertical-fader-fill" style="height: 50%"></div>
                        </div>
                    </div>
                </div>
                `;

                channel.innerHTML = html;
                mixerStrip.appendChild(channel);
            }
        }

        // Load media file
        document.getElementById('loadMediaBtn').addEventListener('click', () => {
            document.getElementById('mediaFileInput').click();
        });

        document.getElementById('mediaFileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            try {
                // Stop existing playback
                if (isPlaying) {
                    stopAudio();
                }

                // Create audio element for playback
                if (!audioElement) {
                    audioElement = new Audio();
                    mediaElementAudioSource = audioContext.createMediaElementAudioSource(audioElement);
                    mediaElementAudioSource.connect(channelGains[0]); // Route to first channel
                }

                // Set audio source
                const url = URL.createObjectURL(file);
                audioElement.src = url;
                audioElement.crossOrigin = 'anonymous';

                // Make sure audio context is running
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                // Enable play button
                document.getElementById('playBtn').disabled = false;

            } catch (error) {
                console.error('Error loading media:', error);
            }
        });

        // Play/Pause button
        document.getElementById('playBtn').addEventListener('click', () => {
            if (!audioElement) return;

            if (isPlaying) {
                audioElement.pause();
                isPlaying = false;
                document.getElementById('playBtn').textContent = '▶';
            } else {
                audioElement.play().catch(e => console.error('Playback error:', e));
                isPlaying = true;
                document.getElementById('playBtn').textContent = '⏸';
            }
        });

        function stopAudio() {
            if (audioElement) {
                audioElement.pause();
                audioElement.currentTime = 0;
                isPlaying = false;
                document.getElementById('playBtn').textContent = '▶';
            }
        }

        // Initialize on load
        initializeMixer();

        // Initialize piano keys (placeholder)
        const pianoKeys = document.getElementById('pianoKeys');
        const notes = ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5'];
        notes.forEach(note => {
            const key = document.createElement('div');
            key.className = 'piano-key';
            key.textContent = note;
            pianoKeys.appendChild(key);
        });

        // Initialize timeline ruler
        const timelineRuler = document.getElementById('timelineRuler');
        for (let i = 0; i < 60; i++) {
            const marker = document.createElement('div');
            marker.className = 'timeline-marker';
            marker.textContent = i + 's';
            timelineRuler.appendChild(marker);
        }
    </script>
</body>
</html>
