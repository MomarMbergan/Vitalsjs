<!-- Biometric Visualization Modal -->
<div id="biometric-modal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Biometric Visualization</h2>
        <div id="ppg-chart"></div>
        <div id="spectrum-chart"></div>
        <div id="tracking-chart"></div>
        <div id="alluvial-diagram"></div>
        <div id="binary-classification"></div>
    </div>
</div>

<style>
    .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 25%;
        height: 25%;
        overflow: auto;
        background-color: rgba(0,0,0,0.8);
    }
    .modal-content {
        background-color: #fefefe;
        margin: 15% auto;
        padding: 20px;
        border: 1px solid transparent;
        border-radius: 5px;
        box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        border: 2px solid rgba(0, 255, 255, 0.5);
    }
    .modal-content h2 {
        color: #00ffff;
    }
</style>

<script>
    document.getElementById('play-button').addEventListener('click', function() { showModal(); });
    document.getElementById('vitals-button').addEventListener('click', function() { showModal(); });
    document.getElementById('eeg-button').addEventListener('click', function() { showModal(); });

    function showModal() {
        document.getElementById('biometric-modal').style.display = 'block';
    }
    document.getElementsByClassName('close')[0].onclick = function() { 
        document.getElementById('biometric-modal').style.display = 'none';
    }
    window.onclick = function(event) { 
        if (event.target == document.getElementById('biometric-modal')) {
            document.getElementById('biometric-modal').style.display = 'none';
        }
    }
</script>

<!-- End of Biometric Visualization Modal -->
